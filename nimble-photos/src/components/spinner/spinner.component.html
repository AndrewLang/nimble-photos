<div class="inline-flex items-center gap-2 text-gray-300" role="status" aria-live="polite">
    <svg class="animate-spin text-current" [attr.width]="size()" [attr.height]="size()" viewBox="0 0 24 24" fill="none"
        xmlns="http://www.w3.org/2000/svg">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3">
        </circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v3.2a4.8 4.8 0 00-4.8 4.8H4z">
        </path>
    </svg>

    @if (showLabel()) {
    <span class="text-[0.65rem] uppercase tracking-[0.3em] text-white/60">
        {{ label() }}
    </span>
    }
</div>
