<section class="mb-6 rounded-xl border border-white/10 bg-slate-900/40 p-6">
    <div class="flex items-start justify-between gap-4 flex-col md:flex-row">
        <div>
            <h2 class="text-lg font-semibold text-white">Viewer Tag Visibility</h2>
            <p class="text-sm text-slate-400 mt-1 max-w-xl">
                Photos tagged with the selected tags will be hidden for users with the viewer role.
            </p>
        </div>
        <button type="button" (click)="saveViewerHiddenTags()" [disabled]="savingTagVisibility()"
            class="rounded-full border border-indigo-500/40 bg-indigo-500/20 px-5 py-2 text-xs font-bold uppercase tracking-widest text-indigo-200 hover:bg-indigo-500/30 disabled:opacity-40">
            {{ savingTagVisibility() ? 'Saving...' : 'Save Visibility Rules' }}
        </button>
    </div>

    @if (tagsLoading()) {
    <div class="mt-5 text-xs text-slate-400">Loading tags...</div>
    } @else {
    <div class="mt-5">
        <mtx-action-selector [actions]="tagOptions()" [selectedKeys]="viewerHiddenTags()"
            (selectedKeysChange)="onViewerHiddenTagsChange($event)">
        </mtx-action-selector>
    </div>
    }

    @if (tagVisibilityError()) {
    <div class="mt-4 rounded-lg border border-rose-500/20 bg-rose-500/5 px-4 py-3 text-xs text-rose-300">
        {{ tagVisibilityError() }}
    </div>
    }
    @if (tagVisibilitySaved()) {
    <div class="mt-4 rounded-lg border border-emerald-500/20 bg-emerald-500/5 px-4 py-3 text-xs text-emerald-300">
        Viewer visibility rules saved.
    </div>
    }
</section>
