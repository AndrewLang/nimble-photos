<div class="animate-in fade-in slide-in-from-bottom-4 duration-500">
    <header
        class="mb-10 p-6 rounded-2xl border border-white/5 bg-linear-to-r from-indigo-500/10 via-slate-900/40 to-transparent">
        <h1 class="text-3xl font-bold tracking-tight text-white mb-2">Photo Management</h1>
        <p class="text-slate-400 text-sm max-w-2xl leading-relaxed">Upload new photos or set photo visibility rules.</p>

        <div class="mt-5 inline-flex rounded-full border border-white/10 bg-slate-950/70 p-1">

            @for(tab of tabs(); track tab) {
            <button type="button" (click)="setActiveTab(tab.key)"
                class="rounded-full px-4 py-1.5 text-xs font-semibold uppercase tracking-wider transition-colors"
                [class.bg-indigo-500]="activeTab() === tab.key" [class.text-white]="activeTab() === tab.key"
                [class.text-slate-300]="activeTab() !== tab.key">
                {{ tab.label }}
            </button>
            }
        </div>
    </header>

    @if (activeTab() === 'upload') {
    <mtx-photo-upload />
    } @else {
    <mtx-photo-visibility />
    }
</div>
