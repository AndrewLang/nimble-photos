@if (isVisible()) {
<div class="rounded-2xl border border-white/5 bg-slate-950/60 p-6">
    <div class="border-b border-white/10 pb-4">
        <h3 class="text-sm font-bold text-slate-500">{{ panelTitle() }}</h3>
        <p class="text-xs text-slate-400 mt-1">
            {{ panelDescription() }}
        </p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="mt-6 grid gap-4">
        <div class="space-y-2">
            <label for="storageLabel"
                class="text-xs font-bold uppercase tracking-widest text-slate-500 ml-1">Name</label>
            <input id="storageLabel" type="text" [formControl]="form.controls.label" placeholder="Primary"
                class="w-full rounded-lg border border-white/10 bg-white/5 px-4 py-1.5 text-sm text-slate-400 placeholder:text-slate-600 focus:outline-none focus:border-indigo-500/50 focus:bg-white/[0.08] transition-all" />
        </div>

        <div class="space-y-2">
            <div class="flex items-center justify-between">
                <label class="text-xs font-bold uppercase tracking-widest text-slate-500 ml-1">Disk</label>
                <div class="flex items-center justify-end gap-2 text-xs pr-1 text-slate-400">
                    @if (selectedDisk()) {
                    <span>Available:</span>
                    <span class="font-semibold text-slate-400">{{ selectedDisk()!.availableBytes | formatSize }}</span>
                    <span>Total:</span>
                    <span class="text-slate-400">{{ selectedDisk()!.totalBytes | formatSize }}</span>
                    }
                </div>
            </div>

            <mtx-dropdown [formControl]="form.controls.diskMount" [options]="diskOptions()" placeholder="Select a disk"
                [labelFn]="getDiskLabel" (valueChange)="onDiskMountChange($event)" />
        </div>

        <div class="space-y-2">
            <label for="storageFolder"
                class="text-xs font-bold uppercase tracking-widest text-slate-500 ml-1">Folder</label>
            <input id="storageFolder" type="text" [formControl]="form.controls.folderName" placeholder="Nimble Photos"
                class="w-full rounded-lg border border-white/10 bg-white/5 px-4 py-1.5 text-sm text-slate-400 placeholder:text-slate-600 focus:outline-none focus:border-indigo-500/50 focus:bg-white/[0.08] transition-all" />
        </div>

        <div class="space-y-2">
            <label class="text-xs font-bold uppercase tracking-widest text-slate-500 ml-1">Category Template</label>
            <mtx-dropdown [formControl]="form.controls.categoryTemplate" [options]="categoryTemplates"
                placeholder="Select a template" />
        </div>

        <div class="flex flex-wrap items-center gap-3">
            <button type="submit" [disabled]="form.invalid || isSaving()"
                class="h-11 rounded-full bg-linear-to-r from-indigo-500 to-sky-500 px-6 text-xs font-semibold uppercase tracking-wider text-slate-400 shadow-lg shadow-indigo-500/20 transition-all hover:from-indigo-400 hover:to-sky-400 disabled:cursor-not-allowed disabled:opacity-40">
                @if (isSaving()) {
                Saving...
                } @else {
                {{ submitLabel() }}
                }
            </button>
            <button type="button" (click)="cancel()"
                class="h-11 rounded-full border border-white/10 px-6 text-xs font-semibold uppercase tracking-wider text-slate-400 hover:text-slate-400">
                Cancel
            </button>
        </div>
    </form>
</div>
}
