@if (hasSelection()) {
<div
    class="absolute left-1/2 -translate-x-1/2 z-60 bg-transparent text-white px-2 py-2 rounded-full flex items-center gap-2 animate-in fade-in zoom-in-95 duration-300">
    <div class="flex items-center gap-2 pl-3 pr-2 border-r border-white/20">
        <button (click)="clearSelection()" class="p-1.5 hover:bg-white/10 rounded-full transition-colors"
            title="Clear Selection">
            <mtx-svg name="closeSolid"></mtx-svg>
        </button>
        <span class="text-xs font-bold uppercase tracking-widest whitespace-nowrap">
            {{ selectionCount() }}
            <span class="hidden md:inline">selected</span></span>
    </div>

    <div class="flex items-center gap-2 pr-1">
        @for(command of selectionCommands(); track command.id) {
        <button (click)="command.action?.()" [title]="command.description || ''"
            class="flex items-center gap-2 rounded-full border border-white/10 bg-white/5 px-3 py-1.5 text-[0.5rem] md:text-xs uppercase text-slate-100 hover:bg-white/20 transition-all cursor-pointer">
            <mtx-svg [name]="command.icon || ''"></mtx-svg>
            <span class="hidden xl:inline whitespace-nowrap">{{ command.name }}</span>
        </button>
        }
    </div>
</div>
}
