services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nimble_photos_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nimble_photos_password}
      POSTGRES_DB: ${POSTGRES_DB:-nimble_photos}
    volumes:
      - type: bind
        source: ${POSTGRES_DATA_DIR:-./docker/postgres-data}
        target: /var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5438}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nimble_photos_admin} -d ${POSTGRES_DB:-nimble_photos}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    environment:
      Nimble_Photo_Url: 0.0.0.0:5151
      NIMBLE_POSTGRES_URL: postgres://${POSTGRES_USER:-nimble_photos_admin}:${POSTGRES_PASSWORD:-nimble_photos_password}@postgres:5432/${POSTGRES_DB:-nimble_photos}
      NIMBLE_POSTGRES_POOLSIZE: ${APP_DB_POOL_SIZE:-20}
      NIMBLE_POSTGRES_TIMEOUT: ${APP_DB_TIMEOUT_SECONDS:-15}
      RUST_LOG: ${RUST_LOG:-info}
    ports:
      - "${APP_PORT:-5151}:5151"
    volumes:
      - "${APP_DATA_DIR}:/app/data"
