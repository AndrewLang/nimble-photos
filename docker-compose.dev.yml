name: nimble-dev-db

services:
  postgres:
    image: postgres:16
    container_name: nimble-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nimble_photos_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nimble_photos_password}
      POSTGRES_DB: ${POSTGRES_DB:-nimble_photos}
    volumes:
      - type: bind
        source: ${POSTGRES_DATA_DIR:-./docker/postgres-data}
        target: /var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5438}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nimble_photos_admin} -d ${POSTGRES_DB:-nimble_photos}"]
      interval: 5s
      timeout: 5s
      retries: 5
